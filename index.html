<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Descarga de videos, audio y transcripciones limpias de YouTube de forma instantánea.">
  <meta name="theme-color" content="#ff1a40">
  
  <!-- Apple Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YT Smart">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  
  <!-- PWA Manifest & Favicon -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  
  <title>YouTube Smart Downloader</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Install PWA Banner -->
    <div id="installBanner" class="install-banner">
      <div class="install-info">
        <span class="install-title">Instalar App</span>
        <span class="install-subtitle">Añádela a tu pantalla de inicio rápido</span>
      </div>
      <button id="btnInstallApp" class="btn-install">Instalar</button>
    </div>

    <!-- Header -->
    <header>
      <div class="logo-wrapper">
        <svg viewBox="0 0 24 24">
          <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
        </svg>
      </div>
      <h1>YouTube Smart</h1>
      <p class="subtitle">Descarga videos, audio y subtítulos limpios</p>
    </header>

    <!-- URL Input and Analyze -->
    <main>
      <div class="input-group">
        <input type="url" id="urlInput" placeholder="Pega el enlace de YouTube aquí..." required autocomplete="off">
      </div>
      <button id="btnAnalyze" class="btn">
        <svg style="width: 20px; height: 20px; fill: currentColor;" viewBox="0 0 24 24">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        Analizar Enlace
      </button>

      <!-- Loader -->
      <div id="loader" class="loader-container" style="display: none;">
        <div class="spinner"></div>
        <span class="loader-text">Analizando formatos disponibles...</span>
      </div>

      <!-- Result Container -->
      <div id="resultContainer" style="display: none;">
        
        <!-- Video Card -->
        <div id="videoCard" class="video-card">
          <div class="thumbnail-container">
            <img id="videoThumbnail" src="" alt="Miniatura">
            <span id="videoDuration" class="duration-tag">00:00</span>
          </div>
          <div class="video-details">
            <div id="videoTitle" class="video-title">Título del Video</div>
            <div id="videoUploader" class="video-uploader">Canal</div>
          </div>
        </div>

        <!-- Download Progress Panel -->
        <div id="progressPanel" class="progress-panel" style="display: none;">
          <div class="progress-details">
            <span id="progressTitle" class="progress-title">Preparando descarga...</span>
            <span id="progressSpeed" class="progress-speed">0 KB/s</span>
          </div>
          <div class="progress-bar-bg">
            <div id="progressBar" class="progress-bar" style="width: 0%;"></div>
          </div>
          <span id="progressPercent" class="progress-percent">0%</span>
        </div>

        <!-- Option Tabs -->
        <div class="tabs">
          <button id="tabVideo" class="tab-btn active">Video</button>
          <button id="tabAudio" class="tab-btn">Audio</button>
          <button id="tabSubtitles" class="tab-btn">Subtítulos</button>
        </div>

        <!-- Options list -->
        <div id="optionsList" class="options-container">
          <!-- Rendered dynamically by app.js -->
        </div>

      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
