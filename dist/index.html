<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rocioyoutube - Descargador Directo y Purga de Subtítulos</title>

    <!-- SEO Best Practices -->
    <meta name="description" content="Aplicación inteligente para descargar audio y video de YouTube de manera directa sin anuncios, y purificar subtítulos SRT eliminando marcas de tiempo a un párrafo de texto limpio." />
    <meta name="author" content="Rocioyoutube" />

    <!-- PWA Meta Tags (Optimizado para Android, iOS y Chrome) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    
    <!-- iOS / Safari Standalone Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rocioyoutube" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/assets/index-C0CWgxhn.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-aUOyIxnB.css">
  </head>
  <body class="bg-slate-950 text-slate-300 antialiased selection:bg-cyan-900 selection:text-cyan-50">
    <div id="root"></div>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Service Worker registrado con éxito. Scope:', reg.scope);
            })
            .catch(err => {
              console.error('Error al registrar el Service Worker:', err);
            });
        });
      }
    </script>
  </body>
</html>
